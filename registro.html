<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportClub – Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght=300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f0f5;
      --card-bg: #ffffff;
      --purple: #1e1340;
      --gold: #f5a800;
      --text: #1e1340;
      --muted: #888899;
      --border: #d8d8e8;
      --input-bg: #f7f7fb;
      --radius: 14px;
      --error-color: #e63946;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2.2rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 10px 40px rgba(30,19,64,0.15);
    }
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.3rem;
      letter-spacing: 2px;
      color: var(--text);
      text-align: center;
      margin-bottom: 1.5rem;
    }
    form { display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .form-group input, .form-group select {
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      width: 100%;
    }
    
    .error-message {
      color: var(--error-color);
      font-size: 0.78rem;
      margin-top: 0.2rem;
      display: none; 
    }
    .btn-submit {
      display: block;
      text-align: center;
      background: var(--purple);
      color: white;
      padding: 0.85rem;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      border: none;
      transition: all 0.3s ease;
    }
    .btn-submit:hover { 
      background: var(--gold); 
      color: var(--purple); 
      transform: translateY(-2px);
    }
    .back-link a { color: var(--purple); text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <main class="card">
    <h1 class="title">CREAR CUENTA</h1>
    <form onsubmit="window.location.href='login.html'; return false;">
      <div class="form-group">
        <label>Nombre Completo</label>
        <input type="text" placeholder="Juan Pérez" required />
        <span class="error-message">El nombre es obligatorio.</span>
      </div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" placeholder="juan@email.com" required />
        <span class="error-message">Ingresa un correo electrónico válido.</span>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="Mínimo 6 caracteres" required />
        <span class="error-message">La contraseña debe tener al menos 6 caracteres.</span>
      </div>
      <div class="form-group">
        <label>Objetivo Deportivo</label>
        <select required>
          <option value="">Selecciona una opción</option>
          <option>Pérdida de Peso</option>
          <option>Ganancia Muscular</option>
          <option>Resistencia / Cardio</option>
          <option>Salud General</option>
        </select>
      </div>
      <button type="submit" class="btn-submit">REGISTRARME</button>
    </form>
    
    <div class="back-link">
      <a href="login.html">¿Ya tienes cuenta? Inicia Sesión</a>
    </div>
  </main>

</body>
</html>
