<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportClub - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <main class="card">
    <img src="../assets/Logo Sportclub.png" alt="SportClub Logo" class="login-logo">
    <form id="formulariologin">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@sportclub.cl" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">INGRESAR</button>
      <p id="error-msg" style="
          display: none;
          color: #d32f2f;
          font-size: 0.88rem;
          font-weight: 600;
          text-align: center;
          margin-top: 0.4rem;
          padding: 0.5rem 0.8rem;
          background: #fff0f0;
          border: 1px solid #f5c2c2;
          border-radius: 6px;
      "></p>
    </form>
    
    <hr class="divider" />
    
    <div class="links-row">
      <a href="registro.html">Registrarse</a>
      <span style="color: var(--border);">|</span>
      <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
      <span style="color: var(--border);">|</span>
      <a href="../index.html" class="btn-volver">←volver a la pagina principal</a>
    </div>
  </main>
  </footer>
<script src="../js/login.js"></script>
</body>
</html>
